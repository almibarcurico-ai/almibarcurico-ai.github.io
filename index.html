<!DOCTYPE html>

    <meta name="theme-color" content="#0A0908" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

      body { overflow: hidden; }
      #root { display: flex; height: 100%; flex: 1; }
    </style>
  </head>
  <body>
    <noscript>Necesitas JavaScript para usar esta app.</noscript>
    <div id="root"></div>
    <script src="./_expo/static/js/web/index-e9010aaa38fb346fea4a2a7833c2304c.js" defer></script>
    <script>
      // Samsung high-DPR fix
      (function() {
        var dpr = window.devicePixelRatio || 1;
        var isAndroid = /Android/.test(navigator.userAgent);
        if (isAndroid && dpr > 2.5) {
          var vp = document.getElementById('vpmeta');
          if (vp) vp.setAttribute('content', 'width=360, user-scalable=no, viewport-fit=cover');
        }
      })();
      // Service Worker registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('./sw.js').catch(function() {});
        });
      }
    </script>
  </body>
</html>
